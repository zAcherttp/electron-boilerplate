name: Package Windows

on:
  workflow_dispatch:
    inputs:
      signed:
        description: Require Windows code signing credentials
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: package-windows-${{ github.ref }}
  cancel-in-progress: false

jobs:
  package:
    name: Windows package
    runs-on: windows-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Install Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run quality gate
        run: pnpm check

      - name: Test packaged application
        run: pnpm test:package

      - name: Build unsigned installer
        if: ${{ !inputs.signed }}
        run: pnpm dist

      - name: Build signed installer
        if: ${{ inputs.signed }}
        run: pnpm dist:signed
        env:
          WIN_CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          WIN_CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}

      - name: Upload installer artifact
        uses: actions/upload-artifact@v7
        with:
          name: electron-boilerplate-windows
          path: |
            release/*.exe
            release/*.blockmap
          if-no-files-found: error
          retention-days: 14
